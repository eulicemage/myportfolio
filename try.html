<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWERFIT - Transform Your Body</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes dash {
            from { width: 0%; }
            to { width: 100%; }
        }
        
        .float { animation: float 3s ease-in-out infinite; }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .slide-in { animation: slideIn 1s ease-out forwards; }
        .rotate { animation: rotate 20s linear infinite; }
        .dash-animate { animation: dash 2s ease-out forwards; }
        
        .glow {
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }
        
        .grid-pattern {
            background-image: 
                linear-gradient(rgba(255, 107, 53, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 53, 0.1) 1px, transparent 1px);
            background-size: 100px 100px;
        }
        
        .gradient-text {
            background: linear-gradient(90deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .delay-200 { animation-delay: 0.2s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-600 { animation-delay: 0.6s; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-900 to-blue-900 min-h-screen text-white overflow-x-hidden">
    
    <!-- Animated Grid Background -->
    <div class="fixed inset-0 grid-pattern pulse-glow pointer-events-none"></div>
    
    <!-- Decorative Rotating Circles -->
    <div class="fixed top-32 right-48 w-48 h-48 pointer-events-none">
        <div class="absolute inset-0 border-2 border-orange-500 rounded-full opacity-30 rotate"></div>
        <div class="absolute inset-4 border border-orange-400 rounded-full opacity-20 rotate" style="animation-direction: reverse;"></div>
    </div>
    
    <!-- Pulsing Dots -->
    <div class="fixed top-1/2 left-32 w-4 h-4 bg-orange-500 rounded-full opacity-50 pulse-glow"></div>
    <div class="fixed top-64 right-64 w-3 h-3 bg-orange-400 rounded-full opacity-50 pulse-glow delay-200"></div>
    <div class="fixed bottom-32 right-96 w-5 h-5 bg-orange-500 rounded-full opacity-50 pulse-glow delay-400"></div>
    
    <div class="relative z-10">
        <!-- Header -->
        <header class="container mx-auto px-6 py-8 slide-in">
            <div class="bg-gray-800 bg-opacity-50 backdrop-blur-sm rounded-xl p-6 flex items-center justify-between">
                <!-- Logo -->
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-r from-orange-500 to-orange-400 rounded-lg glow flex items-center justify-center">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                    </div>
                    <span class="text-3xl font-bold">POWERFIT</span>
                </div>
                
                <!-- Navigation -->
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="#" class="text-gray-300 hover:text-white transition">HOME</a>
                    <a href="#" class="text-gray-300 hover:text-white transition">CLASSES</a>
                    <a href="#" class="text-gray-300 hover:text-white transition">TRAINERS</a>
                    <button class="bg-gradient-to-r from-orange-500 to-orange-400 px-8 py-3 rounded-full font-bold glow hover:scale-105 transition transform">
                        JOIN NOW
                    </button>
                </nav>
            </div>
        </header>
        
        <!-- Hero Section -->
        <section class="container mx-auto px-6 mt-20">
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div class="slide-in delay-200">
                    <h1 class="text-7xl font-bold leading-tight mb-6">
                        TRANSFORM<br>
                        <span class="gradient-text">YOUR BODY</span>
                    </h1>
                    <p class="text-xl text-gray-400 mb-4">
                        Premium fitness experience with cutting-edge equipment
                    </p>
                    <p class="text-xl text-gray-400 mb-10">
                        and expert personal trainers to guide your journey
                    </p>
                    
                    <!-- CTA Buttons -->
                    <div class="flex flex-wrap gap-4">
                        <button class="bg-gradient-to-r from-orange-500 to-orange-400 px-10 py-4 rounded-full font-bold text-lg glow hover:scale-105 transition transform">
                            START TODAY
                        </button>
                        <button class="border-2 border-orange-500 text-orange-500 px-10 py-4 rounded-full font-bold text-lg hover:bg-orange-500 hover:text-white transition">
                            LEARN MORE
                        </button>
                    </div>
                </div>
                
                <!-- Floating Dumbbell -->
                <div class="hidden md:flex justify-center items-center">
                    <div class="relative float">
                        <div class="w-48 h-48 bg-gradient-to-br from-gray-800 to-gray-900 rounded-full flex items-center justify-center glow">
                            <svg class="w-32 h-32" viewBox="0 0 100 100" fill="none">
                                <rect x="25" y="45" width="50" height="10" rx="3" fill="url(#dumbbell-grad)"/>
                                <circle cx="25" cy="50" r="12" fill="#ff6b35"/>
                                <circle cx="75" cy="50" r="12" fill="#ff6b35"/>
                                <circle cx="25" cy="50" r="8" fill="#f7931e"/>
                                <circle cx="75" cy="50" r="8" fill="#f7931e"/>
                                <defs>
                                    <linearGradient id="dumbbell-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" style="stop-color:#ff6b35"/>
                                        <stop offset="100%" style="stop-color:#f7931e"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Stats Cards -->
        <section class="container mx-auto px-6 mt-32">
            <div class="grid md:grid-cols-3 gap-8">
                <!-- Card 1 -->
                <div class="bg-gradient-to-b from-gray-800 to-gray-900 bg-opacity-80 backdrop-blur-sm rounded-2xl p-8 glow hover:transform hover:-translate-y-2 transition duration-300 slide-in delay-400">
                    <div class="text-center">
                        <div class="text-6xl font-bold gradient-text mb-3">500+</div>
                        <div class="text-gray-400 text-lg mb-6">MEMBERS</div>
                        <div class="w-full bg-gray-700 rounded-full h-1 mb-6 overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-orange-500 to-orange-400 dash-animate"></div>
                        </div>
                        <p class="text-gray-500 text-sm">Growing strong</p>
                        <p class="text-gray-500 text-sm">community</p>
                    </div>
                </div>
                
                <!-- Card 2 -->
                <div class="bg-gradient-to-b from-gray-800 to-gray-900 bg-opacity-80 backdrop-blur-sm rounded-2xl p-8 glow hover:transform hover:-translate-y-2 transition duration-300 slide-in delay-600">
                    <div class="text-center">
                        <div class="text-6xl font-bold gradient-text mb-3">50+</div>
                        <div class="text-gray-400 text-lg mb-6">CLASSES</div>
                        <div class="w-full bg-gray-700 rounded-full h-1 mb-6 overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-orange-500 to-orange-400 dash-animate delay-200"></div>
                        </div>
                        <p class="text-gray-500 text-sm">Various training</p>
                        <p class="text-gray-500 text-sm">programs</p>
                    </div>
                </div>
                
                <!-- Card 3 -->
                <div class="bg-gradient-to-b from-gray-800 to-gray-900 bg-opacity-80 backdrop-blur-sm rounded-2xl p-8 glow hover:transform hover:-translate-y-2 transition duration-300 slide-in" style="animation-delay: 0.8s;">
                    <div class="text-center">
                        <div class="text-6xl font-bold gradient-text mb-3">24/7</div>
                        <div class="text-gray-400 text-lg mb-6">ACCESS</div>
                        <div class="w-full bg-gray-700 rounded-full h-1 mb-6 overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-orange-500 to-orange-400 dash-animate delay-400"></div>
                        </div>
                        <p class="text-gray-500 text-sm">Train on your</p>
                        <p class="text-gray-500 text-sm">schedule</p>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Spacing -->
        <div class="h-32"></div>
    </div>
    
</body>
</html>
